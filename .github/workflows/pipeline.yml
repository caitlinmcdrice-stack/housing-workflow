name: Monthly Pipeline Run

on:
  repository_dispatch:
    types: [form_submitted]
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install libraries
        run: pip install requests pandas gspread google-auth openpyxl python-dotenv
      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json
      - name: Run pipeline
        run: python pipeline.py